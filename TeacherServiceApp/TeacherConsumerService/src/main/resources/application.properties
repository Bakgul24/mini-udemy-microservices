server.port=50505
spring.datasource.url=jdbc:postgresql://localhost:5432/teacher-service-db
spring.datasource.username=postgres
spring.datasource.password=100919

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update


spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=teacher-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.akgul.app.miniedu.teacher.consumer.event
spring.kafka.consumer.properties.spring.json.type.mapping=TeacherCreatedEvent:com.akgul.app.miniedu.teacher.consumer.event.TeacherCreatedEvent

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

logging.level.org.springframework.kafka=DEBUG
kafka.topic=my-first-topic